<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creation Platform — AI App Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --panel: #181b24; --panel2: #1f2330;
    --border: #2a2f3f; --text: #e8eaf0; --muted: #8b91a5;
    --accent: #6c7bff; --accent2: #8a5cf6; --good: #3ecf8e;
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  header .spacer { flex: 1; }
  select, button { font: inherit; border-radius: 8px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); padding: 7px 12px; cursor: pointer; }
  button.primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); border: none; font-weight: 600; }
  button:disabled { opacity: .45; cursor: not-allowed; }

  main { flex: 1; display: flex; min-height: 0; }
  #left { width: 380px; min-width: 300px; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--panel); }
  #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 12px; border-radius: 10px; font-size: 14px; line-height: 1.45; max-width: 95%; white-space: pre-wrap; }
  .msg.user { background: var(--accent); color: #fff; align-self: flex-end; }
  .msg.bot  { background: var(--panel2); border: 1px solid var(--border); align-self: flex-start; }
  .msg.err  { background: #3a1d24; border: 1px solid #6e2a3a; color: #ff9db0; align-self: flex-start; }

  #inputRow { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #promptBox { flex: 1; resize: none; height: 64px; font: inherit; font-size: 14px; background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px; }
  #promptBox:focus { outline: 2px solid var(--accent); }

  #right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #toolbar { display: flex; gap: 8px; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  #toolbar .status { font-size: 12px; color: var(--muted); margin-left: auto; }
  #preview { flex: 1; border: none; background: #fff; }
  #codeWrap { flex: 1; display: none; flex-direction: column; min-height: 0; background: #0b0d13; }
  #fileTabs { display: flex; gap: 4px; padding: 8px 12px 0; flex-wrap: wrap; }
  #fileTabs button { font-size: 12px; padding: 5px 10px; border-radius: 6px 6px 0 0; }
  #fileTabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #codeView { flex: 1; overflow: auto; margin: 0; padding: 16px; font: 12px/1.5 ui-monospace, Consolas, monospace; color: #c9d4ff; white-space: pre-wrap; word-break: break-all; }
  #runHint { display: none; padding: 10px 14px; font-size: 13px; color: var(--good); background: #12241c; border-top: 1px solid var(--border); }

  #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--muted); background: var(--bg); }
  #empty .big { font-size: 40px; }
  #empty .ideas { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 30px; }
  #empty .ideas button { font-size: 13px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 800px) {
    main { flex-direction: column; }
    #left { width: 100%; height: 45%; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <h1>⚡ Creation Platform</h1>
  <span class="spacer"></span>
  <select id="targetSel" title="What kind of code to generate"></select>
  <select id="styleSel" title="Visual style for movies" style="display:none">
    <option value="cinematic">🎬 Cinematic</option>
    <option value="phone">📱 Phone / vlog (vertical)</option>
    <option value="cooking">🍳 Cooking show</option>
    <option value="space">🚀 Space flight</option>
    <option value="toys">🧱 Toy / Lego stop-motion</option>
  </select>
  <button id="photoMovieBtn" style="display:none" title="Turn your own photos into a movie">📸 Photo Movie</button>
  <select id="bookSel" title="Book type" style="display:none">
    <option value="picture">📖 Picture book</option>
    <option value="coloring">🖍 Coloring book</option>
    <option value="cyoa">🌟 Choose-your-own-story</option>
    <option value="leveled">🎓 Leveled reader</option>
  </select>
  <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
  <select id="providerSel" title="Which AI builds it"></select>
  <select id="projectSel" title="Load a saved project"><option value="">Load project…</option></select>
  <button id="saveBtn" disabled>💾 Save</button>
  <button id="downloadBtn" disabled>⬇ Download</button>
  <button id="publishBtn" disabled title="Put this app on the public web (needs NETLIFY_TOKEN in .env)">🚀 Publish</button>
</header>

<main>
  <div id="left">
    <div id="chat">
      <div class="msg bot">Hi! Pick a language target (Web = instant preview, Flutter = native mobile, Python = Flask), describe what you want, and watch the code get written live. Then tell me what to change.</div>
    </div>
    <div id="inputRow">
      <textarea id="promptBox" placeholder="e.g. A workout tracker with a weekly calendar and progress charts"></textarea>
      <button class="primary" id="sendBtn">Build</button>
    </div>
  </div>

  <div id="right">
    <div id="toolbar">
      <button id="previewTab">👁 Preview</button>
      <button id="codeTab">&lt;/&gt; Code</button>
      <span class="status" id="status"></span>
    </div>
    <div id="empty">
      <div class="big">🛠️</div>
      <div>Your project will appear here</div>
      <div class="ideas">
        <button onclick="useIdea('A pomodoro focus timer with task list')">Pomodoro timer</button>
        <button onclick="useIdea('A recipe box app with search and categories')">Recipe box</button>
        <button onclick="useIdea('A 2D breakout game with levels and scores')">Breakout game</button>
        <button onclick="useIdea('An expense tracker with monthly charts')">Expense tracker</button>
      </div>
    </div>
    <iframe id="preview" sandbox="allow-scripts" style="display:none"></iframe>
    <div id="codeWrap">
      <div id="fileTabs"></div>
      <pre id="codeView"></pre>
      <div id="runHint"></div>
    </div>
  </div>
</main>

<script>
// ---- state ----
let project = null;      // { target, code (web) OR files [{path,content}] }
let firstPrompt = "";
let busy = false;
let targetsInfo = [];    // from /api/health
let imageProviders = []; // from /api/health
let healthInfo = {};     // full /api/health payload
let lastKeyframes = [];  // [{id, b64, videoPrompt}] after keyframe generation

// Movie style presets: injected into movie-plan prompts and shot lists.
const MOVIE_STYLES = {
  cinematic: { aspect: "16:9", text: "Cinematic film look: 16:9, filmic color grade, deliberate camera moves (dolly, crane), shallow depth of field." },
  phone:     { aspect: "9:16", text: "Shot like real phone footage: VERTICAL 9:16, handheld with natural shake, first-person POV, casual vlog framing, realistic lighting — must feel like someone filming on their phone, not a movie." },
  cooking:   { aspect: "16:9", text: "TV cooking show: bright kitchen set, overhead and close-up shots of hands and ingredients, steam and sizzle details, host addressing camera between steps, warm appetizing color." },
  space:     { aspect: "16:9", text: "Spacecraft flight: cockpit POV and exterior tracking shots, starfields, planets and nebulae, thruster glow, weightless drift, epic scale, sci-fi film lighting." },
  toys:      { aspect: "16:9", text: "Toy stop-motion animation (Lego style): real plastic toys on a physical diorama, slightly jerky stop-motion movement at low frame feel, macro lens depth of field, playful practical-set lighting. The toys visible in the frame come alive; keep every brick and toy exactly as in the source image." },
};
function currentStyle() { return MOVIE_STYLES[$("styleSel").value] || MOVIE_STYLES.cinematic; }

const BOOK_TYPES = {
  picture:  "BOOK TYPE: Picture book — warm read-aloud language, rich colorful illustrations.",
  coloring: "BOOK TYPE: Coloring book — every illustration must be black-and-white line art coloring pages; page text is a one-line caption.",
  cyoa:     "BOOK TYPE: Choose-your-own-story — branching pages with choices and multiple endings.",
  leveled:  "BOOK TYPE: Leveled reader — obey the reading level I state exactly (pre-K through university).",
};
let activeFile = 0;

const $ = (id) => document.getElementById(id);

async function init() {
  const health = await fetch("/api/health").then(r => r.json());
  targetsInfo = health.targets;
  imageProviders = health.imageProviders || [];
  healthInfo = health;

  const tSel = $("targetSel");
  tSel.innerHTML = "";
  for (const t of health.targets) {
    const opt = document.createElement("option");
    opt.value = t.id;
    opt.textContent = t.label;
    tSel.appendChild(opt);
  }

  const pSel = $("providerSel");
  pSel.innerHTML = "";
  for (const p of health.providers) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = (p.configured ? "🟢 " : "⚪ ") + p.label;
    opt.disabled = !p.configured;
    pSel.appendChild(opt);
  }
  const firstOk = health.providers.find(p => p.configured);
  if (firstOk) pSel.value = firstOk.id;
  else addMsg("err", "No API keys found. Add at least one key to the .env file, then restart the server.");
  syncVideoControls();
  refreshProjects();
}

async function refreshProjects() {
  const projects = await fetch("/api/projects").then(r => r.json());
  const sel = $("projectSel");
  sel.innerHTML = '<option value="">Load project…</option>';
  for (const p of projects) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  }
}

function addMsg(kind, text) {
  const div = document.createElement("div");
  div.className = "msg " + kind;
  div.textContent = text;
  $("chat").appendChild(div);
  $("chat").scrollTop = $("chat").scrollHeight;
  return div;
}

function targetInfo(id) { return targetsInfo.find(t => t.id === id) || targetsInfo[0]; }
function isWeb(p) { return p && p.target === "web"; }

function showTab(which) {
  $("preview").style.display = which === "preview" ? "" : "none";
  $("codeWrap").style.display = which === "code" ? "flex" : "none";
}

function renderFileTabs() {
  const tabs = $("fileTabs");
  tabs.innerHTML = "";
  if (!project || isWeb(project)) return;
  project.files.forEach((f, i) => {
    const b = document.createElement("button");
    b.textContent = f.path;
    b.className = i === activeFile ? "active" : "";
    b.onclick = () => { activeFile = i; renderProject(); showTab("code"); };
    tabs.appendChild(b);
  });
}

function renderProject() {
  $("empty").style.display = "none";
  $("saveBtn").disabled = false;
  $("downloadBtn").disabled = false;
  $("publishBtn").disabled = !(isWeb(project) || project.target === "react");

  if (isWeb(project)) {
    $("preview").removeAttribute("src");
    $("preview").setAttribute("sandbox", "allow-scripts");
    $("preview").srcdoc = project.code;
    $("codeView").textContent = project.code;
    $("fileTabs").innerHTML = "";
    $("runHint").style.display = "none";
    showTab("preview");
  } else {
    // Flutter / Python: show files + run instructions.
    const file = project.files[activeFile] || project.files[0];
    $("codeView").textContent = file ? file.content : "";
    renderFileTabs();
    const info = targetInfo(project.target);
    $("runHint").textContent = "▶ How to run: " + info.runInstructions + " ";
    if (project.target === "python" || project.target === "react") {
      const b = document.createElement("button");
      b.textContent = "🌐 Run in browser";
      b.onclick = runLivePreview;
      $("runHint").appendChild(b);
    }
    if (project.target === "video" && imageProviders.some(p => p.configured)) {
      const b = document.createElement("button");
      b.textContent = "🖼 Generate keyframes";
      b.onclick = generateKeyframes;
      $("runHint").appendChild(b);
    }
    if (project.target === "book" && project.files.some(f => f.path === "pages.json")) {
      if (imageProviders.some(p => p.configured)) {
        const b = document.createElement("button");
        b.textContent = "🖼 Illustrate book";
        b.onclick = illustrateBook;
        $("runHint").appendChild(b);
      }
      if ((project.binaries || []).some(x => x.path.startsWith("pages/"))) {
        const v = document.createElement("button");
        v.textContent = "📖 View book";
        v.onclick = showBook;
        $("runHint").appendChild(v);
        if (healthInfo.ffmpeg) {
          const a = document.createElement("button");
          a.textContent = "🎥 Animate book";
          a.onclick = animateBook;
          $("runHint").appendChild(a);
        }
      }
    }
    if (project.target === "godot" && imageProviders.some(p => p.configured) && project.files.some(f => f.path === "assets.json")) {
      const b = document.createElement("button");
      b.textContent = "🎨 Generate game art";
      b.onclick = generateGameArt;
      $("runHint").appendChild(b);
    }
    $("runHint").style.display = "block";
    showTab("code");
  }
}

// ---- generation (streaming) ----
async function send() {
  const promptText = $("promptBox").value.trim();
  if (!promptText || busy) return;
  busy = true;
  $("sendBtn").disabled = true;
  $("promptBox").value = "";
  addMsg("user", promptText);

  const targetId = project ? project.target : $("targetSel").value;
  if (!project) firstPrompt = promptText;

  stopPreview();
  const thinking = addMsg("bot", "");
  thinking.innerHTML = '<span class="spinner"></span>Writing your ' + targetInfo(targetId).label.replace(/^[^ ]+ /, "") + ' live — watch the Code tab…';
  $("status").textContent = "Streaming from " + $("providerSel").selectedOptions[0].textContent;

  $("empty").style.display = "none";
  $("fileTabs").innerHTML = "";
  $("runHint").style.display = "none";
  $("codeView").textContent = "";
  showTab("code");

  try {
    let finalPrompt = promptText;
    if (targetId === "video" && !project) {
      finalPrompt = promptText + "\n\nVISUAL STYLE (use this exactly, in every prompt): " + currentStyle().text;
    }
    if (targetId === "book" && !project) {
      finalPrompt = promptText + "\n\n" + (BOOK_TYPES[$("bookSel").value] || BOOK_TYPES.picture);
    }
    const body = { provider: $("providerSel").value, prompt: finalPrompt, target: targetId };
    if (project && isWeb(project)) body.currentCode = project.code;
    if (project && !isWeb(project)) body.currentFiles = project.files;

    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || "Request failed");
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", streamed = "", result = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const event = JSON.parse(line.slice(5));
        if (event.type === "chunk") {
          streamed += event.text;
          $("codeView").textContent = streamed;
          $("codeView").scrollTop = $("codeView").scrollHeight;
        } else if (event.type === "fixing") {
          streamed = "";
          $("codeView").textContent = "";
          thinking.innerHTML = '<span class="spinner"></span>Found errors in the generated code — auto-fixing…';
        } else if (event.type === "done") {
          result = event;
        } else if (event.type === "error") {
          throw new Error(event.message);
        }
      }
    }

    if (!result) throw new Error("The stream ended without a finished project. Try again.");
    const hadProject = Boolean(project);
    project = result.code !== undefined
      ? { target: result.target, code: result.code, files: [] }
      : { target: result.target, code: "", files: result.files };
    activeFile = 0;
    renderProject();
    thinking.textContent = hadProject
      ? "✅ Updated! Anything else?"
      : (isWeb(project)
          ? "✅ Done! Tell me what to change, or save/download it."
          : "✅ Done! " + project.files.length + " files generated. Check the Code tab, download the ZIP, and see the run instructions at the bottom.");
    $("status").textContent = "";
  } catch (err) {
    thinking.remove();
    addMsg("err", "⚠️ " + err.message);
    $("status").textContent = "";
    if (project) renderProject(); // restore last good state
  }
  busy = false;
  $("sendBtn").disabled = false;
}

function useIdea(text) { $("promptBox").value = text; send(); }

// ---- live Python preview (web-based, no ZIP needed) ----
async function runLivePreview() {
  const note = addMsg("bot", "");
  note.innerHTML = '<span class="spinner"></span>' + (project.target === "react"
    ? "Starting your React app — first run installs packages (~1 minute)…"
    : "Starting your app on this machine…");
  try {
    const res = await fetch("/api/preview", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ files: project.files, kind: project.target }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Preview failed");
    const iframe = $("preview");
    iframe.setAttribute("sandbox", "allow-scripts allow-forms allow-same-origin");
    iframe.removeAttribute("srcdoc");
    iframe.src = data.url;
    showTab("preview");
    note.textContent = "🌐 Running live in the preview! (It runs locally on this machine — it stops when you build something new.)";
  } catch (err) {
    note.textContent = "⚠️ " + err.message;
    note.className = "msg err";
  }
}

// ---- 📚 book pipeline: illustrate → compile → animate ----
function bookPages() {
  const pf = project.files.find(f => f.path === "pages.json");
  try { const p = JSON.parse(pf.content); return Array.isArray(p) ? p : null; } catch { return null; }
}

async function illustrateBook() {
  const pages = bookPages();
  if (!pages) { addMsg("err", "pages.json is missing or invalid — ask me to fix it."); return; }
  const imgProvider = imageProviders.find(p => p.configured);
  const note = addMsg("bot", "");
  project.binaries = (project.binaries || []).filter(b => !b.path.startsWith("pages/"));
  let ok = 0;
  for (let i = 0; i < pages.length; i++) {
    note.innerHTML = '<span class="spinner"></span>Illustrating page ' + (i + 1) + "/" + pages.length + "…";
    try {
      const res = await fetch("/api/image", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ provider: imgProvider.id, prompt: pages[i].illustration_prompt || "" }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "image failed");
      project.binaries.push({ path: "pages/page-" + (pages[i].page ?? i + 1) + ".png", b64: data.b64 });
      ok++;
    } catch (err) {
      addMsg("err", "⚠️ Page " + (pages[i].page ?? i + 1) + ": " + err.message);
    }
  }
  note.textContent = "🖼 Illustrated " + ok + "/" + pages.length + " pages. ";
  const v = document.createElement("button");
  v.textContent = "📖 View book";
  v.onclick = showBook;
  note.appendChild(v);
  showBook();
}

function buildBookHtml() {
  const pages = bookPages() || [];
  const title = (project.files.find(f => f.path === "book.md") || { content: "My Book" }).content.split("\n")[0].replace(/^#+\s*/, "");
  const img = (n) => {
    const b = (project.binaries || []).find(x => x.path === "pages/page-" + n + ".png");
    return b ? '<img src="data:image/png;base64,' + b.b64 + '" alt="illustration">' : "";
  };
  const esc = (s) => String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;");
  const body = pages.map((p) => {
    const choices = (p.choices || []).map(c => '<a class="choice" href="#page-' + c.goto + '">' + esc(c.label) + ' →</a>').join("");
    return '<section class="page" id="page-' + p.page + '">' + img(p.page) +
      '<p class="text">' + esc(p.text) + "</p>" +
      (choices ? '<div class="choices">' + choices + "</div>" : "") +
      (p.ending ? '<p class="ending">— The End —</p>' : "") +
      '<p class="num">' + p.page + "</p></section>";
  }).join("");
  return "<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>" + esc(title) + "</title><style>" +
    "body{font-family:Georgia,serif;background:#f5f0e8;margin:0;color:#2a2320}" +
    "h1{text-align:center;padding:40px 20px 10px;font-size:34px}" +
    ".page{max-width:720px;margin:24px auto;background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.12);padding:28px;text-align:center}" +
    ".page img{max-width:100%;border-radius:8px}" +
    ".text{font-size:22px;line-height:1.6;margin:18px 8px}" +
    ".choices{display:flex;flex-direction:column;gap:10px;margin:14px 0}" +
    ".choice{font-size:18px;color:#1a56db;text-decoration:none;border:2px solid #1a56db;border-radius:10px;padding:10px}" +
    ".ending{font-style:italic;color:#8a6d3b}" +
    ".num{color:#b0a695;font-size:13px}" +
    "@media print{body{background:#fff}.page{box-shadow:none;page-break-after:always;margin:0 auto}h1{page-break-after:always}}" +
    "</style></head><body><h1>" + esc(title) + "</h1>" + body +
    "<p style='text-align:center;color:#b0a695;padding:20px'>Print this page (Ctrl+P) and choose “Save as PDF” to make the real book.</p></body></html>";
}

function showBook() {
  const html = buildBookHtml();
  project.files = project.files.filter(f => f.path !== "book.html").concat([{ path: "book.html", content: html }]);
  const iframe = $("preview");
  iframe.removeAttribute("src");
  iframe.setAttribute("sandbox", "allow-scripts");
  iframe.srcdoc = html;
  $("empty").style.display = "none";
  showTab("preview");
}

function animateBook() {
  const pages = bookPages() || [];
  const frames = pages
    .map(p => ({ id: p.page, b64: ((project.binaries || []).find(x => x.path === "pages/page-" + p.page + ".png") || {}).b64 }))
    .filter(f => f.b64);
  if (frames.length === 0) { addMsg("err", "Illustrate the book first."); return; }
  inhouseMovie(frames);
  addMsg("bot", "💡 Tip: when the video is ready, use 🎤 Add narration — it can read the whole book aloud — then 🎵 Add music.");
}

// ---- game art generation for Godot projects ----
async function generateGameArt() {
  const af = project.files.find(f => f.path === "assets.json");
  let assets;
  try { assets = JSON.parse(af.content); } catch { addMsg("err", "assets.json is not valid JSON — ask me to fix it."); return; }
  if (!Array.isArray(assets) || assets.length === 0) { addMsg("err", "assets.json lists no sprites."); return; }

  const imgProvider = imageProviders.find(p => p.configured);
  const note = addMsg("bot", "");
  project.binaries = project.binaries || [];
  let ok = 0;

  for (let i = 0; i < assets.length; i++) {
    note.innerHTML = '<span class="spinner"></span>Drawing sprite ' + (i + 1) + "/" + assets.length + " (" + (assets[i].file || "?") + ")…";
    try {
      const res = await fetch("/api/image", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ provider: imgProvider.id, prompt: (assets[i].prompt || "") + " Game sprite on a plain solid background, centered, full subject visible." }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "image failed");
      const path = String(assets[i].file || ("assets/sprite" + i + ".png"));
      project.binaries = project.binaries.filter(b => b.path !== path);
      project.binaries.push({ path, b64: data.b64 });
      ok++;
    } catch (err) {
      addMsg("err", "⚠️ " + (assets[i].file || "sprite " + (i + 1)) + ": " + err.message);
    }
  }

  note.textContent = "🎨 Game art done: " + ok + "/" + assets.length + " sprites drawn. They're INCLUDED in the ZIP download — unzip and the game uses them automatically. (Art isn't saved with 💾 projects yet — regenerate after loading.)";
  const cells = project.binaries.map(b => '<figure><img src="data:image/png;base64,' + b.b64 + '"><figcaption>' + b.path + '</figcaption></figure>').join("");
  const iframe = $("preview");
  iframe.removeAttribute("src");
  iframe.setAttribute("sandbox", "allow-scripts");
  iframe.srcdoc = "<!DOCTYPE html><html><head><style>body{font-family:sans-serif;background:#111;color:#eee;margin:16px}div.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}figure{margin:0;background:#1c1c22;border-radius:10px;padding:10px}img{width:100%;border-radius:6px;image-rendering:pixelated}figcaption{margin-top:6px;font-size:12px;color:#aaa}</style></head><body><h2>🎨 Game art</h2><div class='grid'>" + cells + "</div></body></html>";
  $("empty").style.display = "none";
  showTab("preview");
}

// ---- keyframe generation for video projects ----
async function generateKeyframes() {
  const sceneFile = project.files.find(f => f.path === "scenes.json");
  if (!sceneFile) { addMsg("err", "No scenes.json found in this project."); return; }
  let scenes;
  try { scenes = JSON.parse(sceneFile.content); } catch { addMsg("err", "scenes.json is not valid JSON — ask me to fix it."); return; }
  if (!Array.isArray(scenes) || scenes.length === 0) { addMsg("err", "scenes.json has no scenes."); return; }

  const imgProvider = imageProviders.find(p => p.configured);
  const note = addMsg("bot", "");
  const images = [];

  for (let i = 0; i < scenes.length; i++) {
    note.innerHTML = '<span class="spinner"></span>Generating keyframe ' + (i + 1) + " of " + scenes.length + " with " + imgProvider.label + "… (costs a few cents each)";
    try {
      const res = await fetch("/api/image", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ provider: imgProvider.id, prompt: scenes[i].keyframe_prompt || "" }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "image failed");
      images.push({ id: scenes[i].id ?? i + 1, b64: data.b64, error: null, videoPrompt: scenes[i].video_prompt || "" });
    } catch (err) {
      images.push({ id: scenes[i].id ?? i + 1, b64: null, error: err.message, videoPrompt: "" });
    }
  }
  lastKeyframes = images.filter(im => im.b64);

  const ok = images.filter(im => im.b64).length;
  note.textContent = "🖼 Keyframes done: " + ok + "/" + scenes.length + " generated (Preview tab; right-click to save). ";
  const veoReady = (healthInfo.videoProviders || []).some(p => p.configured);
  if (ok > 0 && healthInfo.ffmpeg) {
    const b2 = document.createElement("button");
    b2.textContent = "🎥 Make movie in-house (free)";
    b2.onclick = () => inhouseMovie(lastKeyframes, note);
    note.appendChild(b2);
    if (veoReady) {
      const b = document.createElement("button");
      b.textContent = "🎞 Animate with Veo AI (paid)";
      b.onclick = () => animateAndAssemble(note);
      note.appendChild(b);
    }
  } else if (ok > 0) {
    note.textContent += "Install FFmpeg to make movies (winget install ffmpeg), or animate manually per production-guide.md.";
  }

  const cells = images.map(im => im.b64
    ? '<figure><img src="data:image/png;base64,' + im.b64 + '"><figcaption>Scene ' + im.id + '</figcaption></figure>'
    : '<figure class="err"><div>Scene ' + im.id + ' failed:<br>' + String(im.error).slice(0, 200) + '</div></figure>'
  ).join("");
  const gallery = "<!DOCTYPE html><html><head><style>body{font-family:sans-serif;background:#111;color:#eee;margin:16px}h2{font-weight:600}div.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}figure{margin:0;background:#1c1c22;border-radius:10px;padding:10px}img{width:100%;border-radius:6px}figcaption{margin-top:6px;font-size:13px;color:#aaa}figure.err div{color:#ff9db0;font-size:12px}</style></head><body><h2>🎬 Scene keyframes</h2><div class='grid'>" + cells + "</div></body></html>";

  const iframe = $("preview");
  iframe.removeAttribute("src");
  iframe.setAttribute("sandbox", "allow-scripts");
  iframe.srcdoc = gallery;
  showTab("preview");
}

// ---- shared movie player ----
function playMovie(file, note, label) {
  note.textContent = label + " Playing in the Preview tab. Saved at " + file + " ";
  const googleReady = (healthInfo.providers || []).some(p => p.id === "google" && p.configured);
  if (googleReady && healthInfo.ffmpeg) {
    const b = document.createElement("button");
    b.textContent = "🎤 Add narration";
    b.onclick = async () => {
      let defaultText = "";
      if (project && project.target === "video") {
        const sf = project.files.find(f => f.path === "scenes.json");
        if (sf) { try { defaultText = JSON.parse(sf.content).map(s => s.voiceover).filter(Boolean).join(" "); } catch {} }
      }
      if (project && project.target === "book") {
        const pages = bookPages() || [];
        defaultText = pages.map(p => p.text).filter(Boolean).join(" ");
      }
      const text = prompt("Narration text (spoken over the whole movie):", defaultText);
      if (!text) return;
      const n2 = addMsg("bot", "");
      n2.innerHTML = '<span class="spinner"></span>Recording narration and mixing it in…';
      try {
        const res = await fetch("/api/video/voiceover", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ file, text }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "narration failed");
        playMovie(data.file, n2, "🎤 Narrated movie ready!");
      } catch (err) {
        n2.textContent = "⚠️ " + err.message; n2.className = "msg err";
      }
    };
    note.appendChild(b);
  }
  if (healthInfo.ffmpeg) {
    const m = document.createElement("button");
    m.textContent = "🎵 Add music";
    m.onclick = () => {
      const inp = document.createElement("input");
      inp.type = "file";
      inp.accept = "audio/*";
      inp.onchange = async () => {
        const f = inp.files[0];
        if (!f) return;
        const b64 = await new Promise((resolve) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result).split(",")[1]);
          r.readAsDataURL(f);
        });
        const n3 = addMsg("bot", "");
        n3.innerHTML = '<span class="spinner"></span>Mixing “' + f.name + '” under your movie…';
        try {
          const res = await fetch("/api/video/music", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ file, musicB64: b64, ext: (f.name.split(".").pop() || "mp3") }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "music mix failed");
          playMovie(data.file, n3, "🎵 Scored movie ready!");
        } catch (err) {
          n3.textContent = "⚠️ " + err.message; n3.className = "msg err";
        }
      };
      inp.click();
    };
    note.appendChild(m);
  }
  const iframe = $("preview");
  iframe.removeAttribute("src");
  iframe.setAttribute("sandbox", "allow-scripts");
  iframe.srcdoc = "<!DOCTYPE html><body style='margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh'><video src='" + file + "' controls autoplay style='max-width:100%;max-height:100%'></video></body>";
  $("empty").style.display = "none";
  showTab("preview");
}

// ---- IN-HOUSE movie: our own FFmpeg motion engine, free ----
async function inhouseMovie(frames, prevNote) {
  const note = addMsg("bot", "");
  note.innerHTML = '<span class="spinner"></span>Making your movie with our in-house engine (free, ~30 seconds)…';
  try {
    const res = await fetch("/api/video/motion", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ images: frames.map(f => ({ id: f.id, b64: f.b64 })), aspect: currentStyle().aspect }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "in-house render failed");
    playMovie(data.file, note, "🎥 Your movie is ready (made 100% by our own software)!");
  } catch (err) {
    note.textContent = "⚠️ " + err.message;
    note.className = "msg err";
  }
}

// ---- animate keyframes with Veo, then stitch with FFmpeg ----
async function animateAndAssemble(prevNote) {
  if (!confirm("Animate " + lastKeyframes.length + " scenes with Veo? Video generation costs real money (roughly $1-3 per scene) and takes a few minutes.")) return;
  const note = addMsg("bot", "");
  const clips = [];
  for (let i = 0; i < lastKeyframes.length; i++) {
    const kf = lastKeyframes[i];
    note.innerHTML = '<span class="spinner"></span>Animating scene ' + kf.id + " (" + (i + 1) + "/" + lastKeyframes.length + ")… this takes 1–3 minutes per scene.";
    try {
      const res = await fetch("/api/video/animate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ scene: kf.id, prompt: kf.videoPrompt, imageB64: kf.b64, aspect: currentStyle().aspect }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "animate failed");
      clips.push(data.file);
    } catch (err) {
      addMsg("err", "⚠️ Scene " + kf.id + ": " + err.message);
    }
  }
  if (clips.length === 0) { note.textContent = "⚠️ No scenes were animated."; note.className = "msg err"; return; }

  note.innerHTML = '<span class="spinner"></span>Stitching ' + clips.length + " clips with FFmpeg…";
  try {
    const res = await fetch("/api/video/assemble", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ files: clips }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "assembly failed");
    note.textContent = "🎬 Your movie is ready! Playing in the Preview tab. File saved in the platform's media folder: " + data.file;
    const iframe = $("preview");
    iframe.removeAttribute("src");
    iframe.setAttribute("sandbox", "allow-scripts");
    iframe.srcdoc = "<!DOCTYPE html><body style='margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh'><video src='" + data.file + "' controls autoplay style='max-width:100%;max-height:100%'></video></body>";
    showTab("preview");
  } catch (err) {
    note.textContent = "⚠️ " + err.message;
    note.className = "msg err";
  }
}

// ---- 📸 Photo Movie: user photos → shot list → clips → film ----
$("photoMovieBtn").onclick = () => {
  if (!healthInfo.ffmpeg) { addMsg("err", "Photo Movie needs FFmpeg. Install it (winget install ffmpeg) and restart."); return; }
  $("photoInput").value = "";
  $("photoInput").click();
};

$("photoInput").onchange = async (e) => {
  const files = [...e.target.files];
  if (files.length === 0) return;

  const photos = [];
  for (const f of files) {
    const b64 = await new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(",")[1]);
      r.readAsDataURL(f);
    });
    photos.push({ name: f.name, b64 });
  }

  const style = currentStyle();
  const veoReady = (healthInfo.videoProviders || []).some(p => p.configured);
  const useVeo = veoReady && confirm("Choose motion engine:\n\nOK = Veo AI motion (subjects move & act — costs ~$1-3 per photo)\nCancel = Our in-house engine (cinematic pans & zooms — FREE)");
  if (!useVeo) {
    const kf = photos.map((p, i) => ({ id: "photo" + (i + 1), b64: p.b64 }));
    inhouseMovie(kf);
    return;
  }

  const description = prompt("You picked " + files.length + " photo(s). What should happen in your movie?\n(e.g. 'my Lego pirate ship sets sail, battles a dragon, and wins')");
  if (!description) return;
  const note = addMsg("bot", "");
  note.innerHTML = '<span class="spinner"></span>Directing your movie — writing a shot list for ' + photos.length + " photo(s)…";
  let shots;
  try {
    const res = await fetch("/api/video/shotlist", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ provider: $("providerSel").value, description, style: style.text, count: photos.length }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "shot list failed");
    shots = data.shots;
  } catch (err) {
    note.textContent = "⚠️ " + err.message; note.className = "msg err"; return;
  }

  note.textContent = "🎬 Shot list ready:\n" + shots.map((s, i) => (i + 1) + ". " + s.title).join("\n");
  if (!confirm("Animate " + photos.length + " photo(s) with Veo? Costs roughly $1-3 per photo and takes a few minutes.")) return;

  const work = addMsg("bot", "");
  const clips = [];
  for (let i = 0; i < photos.length; i++) {
    work.innerHTML = '<span class="spinner"></span>Bringing photo ' + (i + 1) + "/" + photos.length + " to life… (1–3 min each)";
    try {
      const res = await fetch("/api/video/animate", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ scene: "photo" + (i + 1), prompt: shots[i].prompt + " Style: " + style.text, imageB64: photos[i].b64, aspect: style.aspect }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "animate failed");
      clips.push(data.file);
    } catch (err) {
      addMsg("err", "⚠️ Photo " + (i + 1) + ": " + err.message);
    }
  }
  if (clips.length === 0) { work.textContent = "⚠️ No photos could be animated."; work.className = "msg err"; return; }

  work.innerHTML = '<span class="spinner"></span>Stitching your movie…';
  try {
    const res = await fetch("/api/video/assemble", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ files: clips }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "assembly failed");
    work.textContent = "🎬 Your photo movie is ready — playing in the Preview tab! Saved at " + data.file;
    const iframe = $("preview");
    iframe.removeAttribute("src");
    iframe.setAttribute("sandbox", "allow-scripts");
    iframe.srcdoc = "<!DOCTYPE html><body style='margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh'><video src='" + data.file + "' controls autoplay style='max-width:100%;max-height:100%'></video></body>";
    $("empty").style.display = "none";
    showTab("preview");
  } catch (err) {
    work.textContent = "⚠️ " + err.message; work.className = "msg err";
  }
};

function stopPreview() {
  fetch("/api/preview", { method: "DELETE" }).catch(() => {});
  const iframe = $("preview");
  iframe.removeAttribute("src");
  iframe.setAttribute("sandbox", "allow-scripts");
}

// ---- toolbar ----
$("sendBtn").onclick = send;
$("promptBox").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("previewTab").onclick = () => { if (project && isWeb(project)) showTab("preview"); };
$("codeTab").onclick = () => { if (project) showTab("code"); };

// New project when target changes (a Flutter app can't continue a web chat).
function syncVideoControls() {
  const isVideo = $("targetSel").value === "video";
  $("styleSel").style.display = isVideo ? "" : "none";
  $("photoMovieBtn").style.display = isVideo ? "" : "none";
  $("bookSel").style.display = $("targetSel").value === "book" ? "" : "none";
}

$("targetSel").onchange = () => {
  stopPreview();
  syncVideoControls();
  if (project) {
    project = null;
    $("saveBtn").disabled = true;
    $("downloadBtn").disabled = true;
    $("empty").style.display = "flex";
    $("preview").style.display = "none";
    $("codeWrap").style.display = "none";
    addMsg("bot", "🆕 New " + targetInfo($("targetSel").value).label + " project — describe what to build.");
  }
};

$("downloadBtn").onclick = async () => {
  if (isWeb(project)) {
    const blob = new Blob([project.code], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "my-app.html";
    a.click();
  } else {
    const zip = new JSZip();
    for (const f of project.files) zip.file(f.path, f.content);
    for (const b of project.binaries || []) zip.file(b.path, b.b64, { base64: true });
    const blob = await zip.generateAsync({ type: "blob" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "my-" + project.target + "-app.zip";
    a.click();
  }
};

$("publishBtn").onclick = async () => {
  if (!project || !(isWeb(project) || project.target === "react")) return;
  const isReact = project.target === "react";
  const name = prompt("Site name (becomes part of the web address):", firstPrompt.slice(0, 30));
  if (!name) return;
  if (!confirm("Publish this app to the PUBLIC web? Anyone with the link can see it.")) return;
  const note = addMsg("bot", "");
  note.innerHTML = '<span class="spinner"></span>' + (isReact ? "Building your React app and publishing (~1–2 minutes)…" : "Publishing to the web…");
  try {
    const res = await fetch("/api/publish", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(isReact
        ? { name, files: project.files, kind: "react" }
        : { name, code: project.code }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Publish failed");
    note.textContent = "🚀 Live on the web: ";
    const a = document.createElement("a");
    a.href = data.url;
    a.target = "_blank";
    a.textContent = data.url;
    a.style.color = "#9db4ff";
    note.appendChild(a);
  } catch (err) {
    note.textContent = "⚠️ " + err.message;
    note.className = "msg err";
  }
};

$("saveBtn").onclick = async () => {
  const name = prompt("Name this project:", firstPrompt.slice(0, 40));
  if (!name) return;
  await fetch("/api/projects", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ name, prompt: firstPrompt, target: project.target, code: project.code, files: project.files, binaries: project.binaries || [] }),
  });
  refreshProjects();
  addMsg("bot", "💾 Saved as “" + name + "”.");
};

$("projectSel").onchange = async (e) => {
  if (!e.target.value) return;
  const p = await fetch("/api/projects/" + e.target.value).then(r => r.json());
  firstPrompt = p.prompt || p.name;
  project = { target: p.target || "web", code: p.code || "", files: p.files || [], binaries: p.binaries || [] };
  activeFile = 0;
  $("targetSel").value = project.target;
  renderProject();
  addMsg("bot", "📂 Loaded “" + p.name + "”. Tell me what to change.");
  e.target.value = "";
};

init();
</script>
